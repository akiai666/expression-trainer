<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>表达训练</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- 洋红闪烁边框 -->
  <div class="glow-border"></div>

  <!-- 耳机DJ少女 icon -->
  <div class="girl-icon">
    <svg width="50" height="50" viewBox="0 0 70 70" fill="none">
      <path d="M16 32 Q16 14 35 12 Q54 14 54 32" stroke="#E5007E" stroke-width="2.5" fill="none"/>
      <rect x="12" y="30" width="7" height="12" rx="3" fill="#E5007E" opacity="0.6"/>
      <rect x="51" y="30" width="7" height="12" rx="3" fill="#E5007E" opacity="0.6"/>
      <circle cx="35" cy="38" r="14" stroke="#E5007E" stroke-width="2" fill="none"/>
      <path d="M28 36 Q32 33 36 36" stroke="#E5007E" stroke-width="1.5" fill="none"/>
      <path d="M38 36 Q41 34 44 37" stroke="#E5007E" stroke-width="1.5" fill="none"/>
      <circle cx="32" cy="35.5" r="1.2" fill="#E5007E"/>
      <path d="M31 43 Q35 46 39 43" stroke="#E5007E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
  <!-- 顶部控制栏 -->
  <div class="control-bar">
    <div class="control-left">
      <span class="app-title">表达训练</span>
    </div>
    <div class="control-right">
      <span id="timer" class="timer">00:00</span>
      <button id="btn-settings" class="btn-icon" title="设置">⚙️</button>
    </div>
  </div>

  <!-- 主字幕区域 -->
  <div class="subtitle-area">
    <div id="subtitle-container" class="subtitle-container">
      <div id="subtitle-text" class="subtitle-line current" style="color:#666;">点击下方按钮开始说话</div>
    </div>
  </div>

  <!-- 实时反馈浮层 -->
  <div id="feedback-panel" class="feedback-panel hidden">
    <div class="feedback-header">
      <span>💡 实时反馈</span>
      <button id="btn-close-feedback" class="btn-close">×</button>
    </div>
    <div id="feedback-content" class="feedback-content">
      <!-- 实时反馈内容 -->
    </div>
  </div>

  <!-- 词库分析面板 -->
  <div id="lexicon-panel" class="lexicon-panel hidden">
    <div class="lexicon-header">
      <span>📊 表达分析</span>
    </div>
    <div id="lexicon-content" class="lexicon-content">
      <div class="stat-row">
        <span class="stat-label">填充词</span>
        <span id="stat-fillers" class="stat-value">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">犹豫词</span>
        <span id="stat-hedges" class="stat-value">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">笼统词</span>
        <span id="stat-vague" class="stat-value">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">表达密度</span>
        <span id="stat-density" class="stat-value">--</span>
      </div>
    </div>
  </div>

  <!-- 底部操作区 -->
  <div class="action-bar">
    <button id="btn-start" class="btn-main btn-start">
      <span class="btn-icon-inner">🎤</span>
      <span class="btn-label">开始录制</span>
    </button>
    <button id="btn-pause" class="btn-main btn-pause hidden">
      <span class="btn-icon-inner">⏸️</span>
      <span class="btn-label">暂停</span>
    </button>
    <button id="btn-resume" class="btn-main btn-start hidden">
      <span class="btn-icon-inner">▶️</span>
      <span class="btn-label">继续</span>
    </button>
    <button id="btn-stop" class="btn-main btn-stop hidden">
      <span class="btn-icon-inner">⏹️</span>
      <span class="btn-label">结束</span>
    </button>
    <button id="btn-report" class="btn-main btn-report hidden">
      <span class="btn-icon-inner">📋</span>
      <span class="btn-label">生成报告</span>
    </button>
  </div>

  <!-- 最终报告弹窗 -->
  <div id="report-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 表达分析报告</h2>
        <button id="btn-close-report" class="btn-close">×</button>
      </div>
      <div id="report-body" class="modal-body">
        <!-- 报告内容 -->
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
